<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Caja - GLOW_MOD</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="caja-panel">

<h2>Resumen de compra</h2>

<div id="checkoutItems"></div>

<div class="caja-total">

Total: <span id="checkoutTotal">$0</span>

</div>

<div class="checkout-actions">

<button class="cancel-btn" onclick="cancelPurchase()">

Cancelar compra

</button>

<button class="primary-btn" onclick="showPayment()">

Procesar pago

</button>

</div>

</div>


<!-- METODO DE PAGO -->

<div class="payment-modal" id="paymentModal">

<div class="payment-box">

<h3>Selecciona método de pago</h3>

<button onclick="pay('Tarjeta')">💳 Tarjeta</button>

<button onclick="pay('PayPal')">🅿️ PayPal</button>

<button onclick="pay('Efectivo')">💵 Contra entrega</button>

<button class="cancel-btn" onclick="closePayment()">

Cancelar

</button>

</div>

</div>

<script src="checkout.js"></script>

</body>

</html>
