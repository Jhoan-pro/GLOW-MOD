<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GLOW_MOD</title>

<link rel="stylesheet" href="styles.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo">GLOW_MOD</div>

  <nav class="nav-links">
    <a href="index.html">Inicio</a>
    <div class="dropdown">
      <a href="#">Filtros</a>
      <div class="dropdown-menu">
        <a href="#">Categoría 1</a>
        <a href="#">Categoría 2</a>
        <a href="#">Categoría 3</a>
      </div>
    </div>
  </nav>   

  <div class="actions">
    <!-- Buscador -->
    <div class="search-box">
      <button id="btn-lupa">🔍</button>
      <input type="text" id="barra-busqueda" placeholder="Buscar...">
    </div>

    <!-- Carrito en navbar -->
    <div class="cart-icon" onclick="toggleCart()">🛒</div>

    <!-- Perfil -->
    <div class="user-dropdown">
      <div class="user-icon">👤</div>
      <div class="dropdown-menu">
        <a href="#">Administrar cuenta</a>
        <a href="#">Tus pedidos</a>
        <a href="#">Reseñas</a>
        <a href="#">Historial</a>
        <a href="#">Ajustes</a>
        <a href="#" class="logout" onclick="logout()">Cerrar sesión</a>
      </div>
    </div>
  </div>
</header>


<!-- HERO -->
<section class="hero">

<div>

<h1>Nueva Colección 2026</h1>

<p>Estilo moderno y minimalista</p>

<button class="primary-btn">Explorar</button>

</div>

</section>

<!-- PRODUCTOS -->
<section class="products">

<div class="product-grid" id="productGrid"></div>

</section>



<!-- CARRITO -->

<div class="side-cart" id="sideCart">

<div class="cart-header">

<h3>Tu Carrito</h3>

<span onclick="toggleCart()">✖</span>

</div>

<div class="cart-content" id="cartItems"></div>

<div class="cart-footer">

<div class="cart-summary">

<p>Subtotal: <span id="cartSubtotal">$0</span></p>

<p>Total: <span id="cartTotal">$0</span></p>

</div>

<div class="cart-buttons">

<button class="cancel-btn" onclick="clearCart()">Cancelar</button>

<button class="primary-btn" onclick="goToCheckout()">Comprar</button>

</div>

</div>

</div>

<!-- SCRIPT -->

<script src="script.js"></script>

</body>
</html>
