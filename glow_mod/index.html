<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLOW_MOD</title>
<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo">GLOW_MOD</div>

  <div class="nav-links">
    <a href="index.html">Inicio</a>
    <div class="user-icon" id="userBtn">👤</div>
  </div>
</header>

<!-- USER MENU -->
<div class="user-menu" id="userMenu">
  <p><strong>Usuario:</strong> Cliente</p>
  <button class="secondary-btn" onclick="logout()">Cerrar sesión</button>
</div>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>Nueva Colección 2026</h1>
    <p>Estilo moderno y minimalista</p>
    <button class="primary-btn">Explorar</button>
  </div>
</section>

<!-- PRODUCTOS -->
<section class="products">
  <div class="product-grid" id="productGrid"></div>
</section>

<!-- BOTÓN CARRITO -->
<div class="cart-toggle" onclick="toggleCart()">🛒</div>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<!-- CARRITO -->
<div class="side-cart" id="sideCart">

  <div class="cart-header">
    <h3>Tu Carrito</h3>
    <span onclick="toggleCart()">✖</span>
  </div>

  <div class="cart-content" id="cartItems"></div>

  <div class="cart-footer">
    <h3 id="cartTotal">Total: $0</h3>
    <button class="primary-btn">Comprar</button>
  </div>

</div>

<script>

/* ===============================
   PRODUCTOS BASE
================================= */
const products = [
  {
    name:"Sudadera Glow",
    price:49.99,
   image:"https://images.unsplash.com/photo-1618354691373-d851c5c3a990?auto=format&fit=crop&w=600&q=80"
  },
  {
    name:"Chaqueta Urban",
    price:79.99,
    image:"https://images.unsplash.com/photo-1490481651871-ab68de25d43d?auto=format&fit=crop&w=600&q=80"
    
  },
  {
    name:"Camiseta Classic",
    price:29.99,
    image:"https://images.unsplash.com/photo-1523381210434-271e8be1f52b?auto=format&fit=crop&w=600&q=80"
  },
  {
    name:"Pantalón Street",
    price:59.99,
    image:"https://images.unsplash.com/photo-1541099649105-f69ad21f3246?auto=format&fit=crop&w=600&q=80"
  },
  {
    name: "Hoodie Night",
    price: 69.99,
    image: "https://images.unsplash.com/photo-1617749287908-5ff4d3c2f69c?auto=format&fit=crop&w=600&q=80"
  },
  {
    name:"Oversize Tee",
    price:34.99,
    image:"https://images.unsplash.com/photo-1585386959984-a4155224a1ad?auto=format&fit=crop&w=600&q=80"
  }
];

/* ===============================
   RENDER PRODUCTOS
================================= */
function renderProducts(){
  const grid = document.getElementById("productGrid");
  grid.innerHTML="";

  products.forEach((product,index)=>{
    grid.innerHTML+=`
      <div class="card">
        <img src="${product.image}" onerror="this.src='https://via.placeholder.com/300x300?text=Imagen'">
        <h3>${product.name}</h3>
        <p>$${product.price}</p>
        <button class="add-btn" onclick="addToCart(${index})">
          Agregar al carrito
        </button>
      </div>
    `;
  });
}

/* ===============================
   CARRITO
================================= */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(index){

  const product = products[index];

  const existing = cart.find(item=>item.name===product.name);

  if(existing){
    existing.qty++;
  }else{
    cart.push({...product, qty:1});
  }

  saveCart();
  renderCart();
}

function renderCart(){

  const container = document.getElementById("cartItems");
  const totalEl = document.getElementById("cartTotal");

  container.innerHTML="";
  let total=0;

  cart.forEach((item,i)=>{

    total+=item.price*item.qty;

    container.innerHTML+=`
      <div class="cart-item">
        <img src="${item.image}">
        <div>
          <h4>${item.name}</h4>
          <p>$${item.price}</p>
          <div class="qty-control">
            <button onclick="changeQty(${i},-1)">-</button>
            <span>${item.qty}</span>
            <button onclick="changeQty(${i},1)">+</button>
          </div>
          <div class="remove-btn" onclick="removeItem(${i})">Eliminar</div>
        </div>
      </div>
    `;
  });

  totalEl.innerText="Total: $"+total.toFixed(2);

}

function changeQty(index,amount){
  cart[index].qty+=amount;
  if(cart[index].qty<=0){
    cart.splice(index,1);
  }
  saveCart();
  renderCart();
}

function removeItem(index){
  cart.splice(index,1);
  saveCart();
  renderCart();
}

function saveCart(){
  localStorage.setItem("cart",JSON.stringify(cart));
}

function toggleCart(){
  document.getElementById("sideCart").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

/* ===============================
   USER MENU
================================= */
const userBtn=document.getElementById("userBtn");
const userMenu=document.getElementById("userMenu");

userBtn.addEventListener("click",()=>{
  userMenu.classList.toggle("active");
});

function logout(){
  alert("Sesión cerrada (mockup)");
}

/* INIT */
renderProducts();
renderCart();

</script>

</body>
</html>
