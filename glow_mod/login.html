<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - GLOW_MOD</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="login-container">

<div class="login-box">
  <h2>Iniciar Sesión</h2>

  <input type="email" id="email" placeholder="Correo electrónico">
  <input type="password" id="password" placeholder="Contraseña">

  <select id="role">
    <option value="cliente">Ingresar como Cliente</option>
    <option value="admin">Ingresar como Administrador</option>
  </select>

  <div class="forgot-link">¿Olvidaste tu contraseña?</div>

  <button class="primary-btn" onclick="login()">Ingresar</button>

  <div class="divider">o continuar con</div>

  <div class="social-login">
    <button class="google-btn">Google</button>
    <button class="apple-btn">Apple</button>
    <button class="facebook-btn">Facebook</button>
  </div>
</div>

<script>
function login(){

  const email=document.getElementById("email").value;
  const role=document.getElementById("role").value;

  if(email===""){
    alert("Ingresa un correo");
    return;
  }

  localStorage.setItem("userEmail",email);
  localStorage.setItem("userRole",role);

  if(role==="admin"){
    window.location.href="admin-panel.html";
  }else{
    window.location.href="index.html";
  }

}
</script>

</body>
</html>
