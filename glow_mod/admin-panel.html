<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="styles.css">
<title>Panel Administrador</title>
</head>
<body class="panel-bg">

<div class="admin-wrapper">

<h2 class="admin-title">Panel Administrador</h2>

<!-- STATS -->
<div class="admin-stats">
  <div class="stat-card">
    <h3>Total Productos</h3>
    <p>24</p>
  </div>

  <div class="stat-card">
    <h3>Ventas Hoy</h3>
    <p>$1,240</p>
  </div>

  <div class="stat-card">
    <h3>Clientes</h3>
    <p>132</p>
  </div>
</div>

<!-- TABLE -->
<div class="admin-table-wrapper">

  <div class="admin-top-bar">
    <div class="admin-search">
      <input type="text" placeholder="Buscar producto...">
      <button>🔍</button>
    </div>

    <button class="add-product-btn">+ Nuevo Producto</button>
  </div>

  <table class="admin-table">
    <thead>
      <tr>
        <th>Imagen</th>
        <th>Nombre</th>
        <th>Precio</th>
        <th>Stock</th>
        <th>Acciones</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td>
          <img class="product-img-small" 
          src="https://images.unsplash.com/photo-1618354691373-d851c5c3a990?auto=format&fit=crop&w=300&q=80">
        </td>
        <td>Sudadera Glow</td>
        <td>$49.99</td>
        <td>15</td>
        <td>
          <div class="admin-actions">
            <button class="edit-btn">Editar</button>
            <button class="delete-btn">Eliminar</button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>

</div>

</div>

</body>
</html>
